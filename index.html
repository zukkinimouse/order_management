<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>発注管理</title>
<!-- PWA対応：Webアプリマニフェスト -->
<link rel="manifest" href="manifest.json">
<!-- iOSのホーム画面追加対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="発注管理">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<!-- テーマカラー -->
<meta name="theme-color" content="#2c5f2e">
<!-- Firebase SDK（チェック状態のリアルタイム同期） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e0dbd2;
    --text: #1a1814;
    --text-sub: #8a8070;
    --accent: #2c5f2e;
    --accent-light: #e8f0e8;
    --danger: #c0392b;
    --hidden-bg: #f0ede8;
    --hidden-text: #bbb5aa;
    --check-active: #2c5f2e;
    --handle: #c8c0b4;
    --tab-active: #2c5f2e;
    --tab-text: #6a6258;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ヘッダー */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-badge {
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .reset-timer {
    font-size: 11px;
    color: var(--text-sub);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }
  .reset-timer.soon {
    color: #c0392b;
    border-color: #c0392b;
    background: #fdf0ef;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
    align-items: center;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--tab-text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    -webkit-user-select: none;
    user-select: none;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* タブ追加ボタン */
  .tab-add-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px dashed var(--border);
    background: transparent;
    color: var(--text-sub);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 400;
    font-family: inherit;
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .tab-add-btn:active { opacity: 0.6; }

  /* タブ操作コンテキストメニュー */
  .tab-ctx-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
  }
  .tab-ctx-overlay.open { display: block; }
  .tab-ctx-menu {
    position: absolute;
    background: var(--surface);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    border: 1px solid var(--border);
    overflow: hidden;
    min-width: 160px;
  }
  .tab-ctx-btn {
    display: block;
    width: 100%;
    padding: 12px 16px;
    border: none;
    background: none;
    text-align: left;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }
  .tab-ctx-btn:active { background: var(--bg); }
  .tab-ctx-btn + .tab-ctx-btn { border-top: 1px solid var(--border); }
  .tab-ctx-delete { color: var(--danger); }

  /* 列ヘッダー */
  .col-header {
    display: grid;
    grid-template-columns: 48px 1fr 52px 52px 40px;
    gap: 4px;
    padding: 8px 12px 6px;
    font-size: 10px;
    color: var(--text-sub);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .col-header span { text-align: center; }
  .col-header .col-name { text-align: left; padding-left: 2px; }

  /* リスト */
  .list {
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* 行 */
  .item {
    display: grid;
    grid-template-columns: 48px 1fr 52px 52px 40px;
    gap: 4px;
    align-items: center;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 10px 8px;
    transition: all 0.2s;
    cursor: default;
    box-shadow: var(--shadow);
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .item.hidden-item {
    background: var(--hidden-bg);
    border-color: transparent;
    box-shadow: none;
    opacity: 0.6;
  }
  .item.checked {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .item.dragging {
    opacity: 0.4;
    transform: scale(0.98);
  }
  .item.drag-over {
    border-color: var(--accent);
    border-style: dashed;
  }

  /* 操作列（ハンドル＋目） */
  .ops {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .handle {
    color: var(--handle);
    font-size: 18px;
    cursor: grab;
    line-height: 1;
    user-select: none;
    padding: 4px 6px;
    border-radius: 6px;
    touch-action: none;
  }
  .handle:active { cursor: grabbing; }
  .toggle-vis {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .toggle-vis:hover { opacity: 1; }
  .toggle-vis.vis-on { opacity: 1; }

  /* 商品名 */
  .item-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    cursor: pointer;
    color: var(--text);
    word-break: break-all;
  }
  .item-name.hidden-text { color: var(--hidden-text); }
  .item-name .short-name {
    display: block;
  }
  .item-name .hint {
    font-size: 10px;
    color: var(--text-sub);
    font-weight: 400;
    margin-top: 1px;
  }

  /* 数値セル（タップで選択ポップアップを開く） */
  .num-cell {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 7px 4px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .item.hidden-item .num-cell {
    background: transparent;
    border-color: transparent;
    color: var(--hidden-text);
    pointer-events: none;
  }

  /* 数値選択ポップアップ */
  .num-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 400;
    align-items: flex-end;
    justify-content: center;
  }
  .num-popup-overlay.open { display: flex; }
  .num-popup {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 16px 16px 36px;
    width: 100%;
    max-width: 480px;
  }
  .num-popup-bar {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 12px;
  }
  .num-popup-title {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 14px;
  }
  .num-popup-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .num-popup-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }
  .num-popup-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .num-popup-cancel {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  /* チェックボックス */
  .check-cell {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .check-box {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    border: 2px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
    flex-shrink: 0;
  }
  .check-box.checked {
    background: var(--check-active);
    border-color: var(--check-active);
    color: white;
  }
  .item.hidden-item .check-box {
    pointer-events: none;
    opacity: 0.3;
  }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal {
    transform: translateY(0);
  }
  .modal-bar {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal h2 {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .modal .full-name {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 20px;
    color: var(--text);
  }
  .modal-field {
    margin-bottom: 14px;
  }
  .modal-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .modal-field input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
  }
  .modal-field input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }

  /* タブチェックリスト（商品詳細モーダル内） */
  .tab-check-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .tab-check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    transition: all 0.15s;
  }
  .tab-check-item.active {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .tab-check-item-icon {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    color: transparent;
  }
  .tab-check-item.active .tab-check-item-icon {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .tab-check-item-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .tab-check-item.active .tab-check-item-label {
    color: var(--accent);
  }

  /* 発注確認バー */
  .order-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--accent);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 150;
    transform: translateY(100%);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 -4px 20px rgba(44,95,46,0.3);
  }
  .order-bar.visible { transform: translateY(0); }
  .order-bar-text { font-size: 15px; font-weight: 700; }
  .order-bar-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }
  .order-bar-btn {
    background: white;
    color: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  /* 発注確認モーダル */
  .order-modal-list {
    max-height: 50vh;
    overflow-y: auto;
    margin: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .order-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
  }
  .order-item-row span:last-child {
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    margin-left: 8px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-sub);
    font-size: 13px;
    padding: 40px 0;
  }

  /* 発注履歴による左ボーダー色分け */
  .item.hist-blue   { border-left: 4px solid #3b82f6; }
  .item.hist-yellow { border-left: 4px solid #f59e0b; }
  .item.hist-red    { border-left: 4px solid #ef4444; }

  /* モーダル内の色手動設定セレクター */
  .color-selector {
    display: flex;
    gap: 6px;
  }
  .color-opt {
    flex: 1;
    padding: 8px 4px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: var(--text-sub);
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .color-opt.c-blue.selected   { background: #3b82f6; border-color: #3b82f6; color: white; }
  .color-opt.c-yellow.selected { background: #f59e0b; border-color: #f59e0b; color: white; }
  .color-opt.c-red.selected    { background: #ef4444; border-color: #ef4444; color: white; }
  .color-opt.c-auto.selected,
  .color-opt.c-none.selected   { background: var(--text); border-color: var(--text); color: white; }

  /* 絞り込みフィルターバー */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 8px 0 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-sub);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .filter-btn.active          { background: var(--text);  border-color: var(--text);  color: white; }
  .filter-btn.f-blue.active   { background: #3b82f6; border-color: #3b82f6; color: white; }
  .filter-btn.f-yellow.active { background: #f59e0b; border-color: #f59e0b; color: white; }
  .filter-btn.f-red.active    { background: #ef4444; border-color: #ef4444; color: white; }

</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📦 発注管理</h1>
    <div class="header-right">
      <span class="reset-timer" id="reset-timer" style="display:none"></span>
      <span class="header-badge" id="check-count">0件</span>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="filter-bar" id="filter-bar"></div>
</div>

<div class="col-header">
  <span></span>
  <span class="col-name">商品名</span>
  <span>最低在庫</span>
  <span>発注数</span>
  <span>確認</span>
</div>

<div class="list" id="list"></div>

<div class="order-bar" id="order-bar">
  <div>
    <div class="order-bar-text" id="bar-text">0件を発注</div>
    <div class="order-bar-sub">タップして確認</div>
  </div>
  <button class="order-bar-btn" onclick="openOrderModal()">確認する</button>
</div>

<!-- 商品詳細モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-bar"></div>
    <h2>商品詳細</h2>
    <div class="full-name" id="modal-fullname"></div>
    <div class="modal-field">
      <label>省略名（リスト表示用）</label>
      <input type="text" id="modal-shortname" placeholder="例：ホットRカップ">
    </div>
    <div class="modal-field">
      <label>最低在庫数</label>
      <input type="number" id="modal-min" min="0">
    </div>
    <div class="modal-field">
      <label>発注数（デフォルト）</label>
      <input type="number" id="modal-order" min="1">
    </div>
    <!-- 表示するタブの選択（カスタムタブがある場合のみ表示） -->
    <div class="modal-field" id="modal-tabs-field" style="display:none">
      <label>表示するタブ</label>
      <div class="tab-check-list" id="modal-tabs"></div>
    </div>
    <div class="modal-field">
      <label>色の設定（手動上書き）</label>
      <div class="color-selector" id="modal-color"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<!-- 発注確認モーダル -->
<div class="modal-overlay" id="order-modal" onclick="closeOrderModal(event)">
  <div class="modal">
    <div class="modal-bar"></div>
    <h2>発注リスト</h2>
    <div class="order-modal-list" id="order-modal-list"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeOrderModalDirect()">閉じる</button>
      <button class="btn btn-primary" onclick="completeOrder()">完了 ✓</button>
    </div>
  </div>
</div>

<!-- 数値選択ポップアップ（最低在庫・発注数） -->
<div class="num-popup-overlay" id="num-popup-overlay" onclick="closeNumPopup()">
  <div class="num-popup" onclick="event.stopPropagation()">
    <div class="num-popup-bar"></div>
    <div class="num-popup-title" id="num-popup-title"></div>
    <div class="num-popup-grid" id="num-popup-grid"></div>

// ========== ユーティリティ ==========
function autoShorten(name) {
  let s = name.replace(/[◆◎△▲]/g, '').trim();
  s = s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  s = s.replace(/[Ａ-Ｚａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  s = s.replace(/\s*[\d０-９,，]+[個本枚入膳巻kgKG]+\s*$/g, '').trim();
  s = s.replace(/\s+/g, ' ').trim();
  if (s.length > 14) s = s.slice(0, 14) + '…';
  return s;
}

function autoOrderQty(name) {
  const m = name.match(/([0-9０-９,，]+)(個|本|枚|入|膳|巻)/);
  if (!m) return 1;
  return parseInt(m[1].replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/[,，]/g, ''));
}

// HTML属性値用エスケープ（データ属性に安全に格納するため）
function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

// HTML表示用エスケープ
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function makeProducts(rawList, tab, startId) {
  return rawList.map((line, i) => {
    const clean = line.replace(/[◆◎△▲]/g, '').trim();
    return {
      id: startId + i,
      tabs: [tab],  // 所属タブの配列（複数タブに同時に追加可能）
      fullName: clean,
      shortName: autoShorten(clean),
      minStock: 1,
      orderQty: 1,
      checked: false,
      visible: true,
    };
  });
}

/**
 * 発注履歴（または手動上書き）に基づいて色分けクラスを返す
 *   手動上書きが設定されている場合はそちらを優先する
 *   なし: 履歴なし（デフォルト色を維持）
 *   青:   1週間以内に発注
 *   黄:   1週間〜1ヶ月前に発注
 *   赤:   1ヶ月以上発注なし
 */
function getHistoryClass(id) {
  const ov = colorOverride[id];
  if (ov === 'none') return '';
  if (ov)            return `hist-${ov}`;

  const ts = orderHistory[id];
  if (!ts) return '';
  const age   = Date.now() - ts;
  const WEEK  = 7  * 24 * 3600 * 1000;
  const MONTH = 30 * 24 * 3600 * 1000;
  if (age <= WEEK)  return 'hist-blue';
  if (age <= MONTH) return 'hist-yellow';
  return 'hist-red';
}

// ========== 状態 ==========
let currentTab    = "雑貨";
let dragSrcIndex  = null;
let modalTargetId = null;
let currentFilter = 'all'; // 'all' | 'blue' | 'yellow' | 'red' | 'none'

// 現在有効な全タブを返す（デフォルト + カスタム）
function getTabs() { return [...DEFAULT_TABS, ...customTabs]; }

// 現在表示中タブの商品配列を返す
function getProducts() { return allProducts[currentTab] || []; }

// 全タブをまたいで重複なしで商品を返す（チェック集計・発注処理用）
function getAllProductsUnique() {
  const seen = new Set();
  const result = [];
  getTabs().forEach(tab => {
    (allProducts[tab] || []).forEach(p => {
      if (!seen.has(p.id)) { seen.add(p.id); result.push(p); }
    });
  });
  return result;
}

// IDから商品オブジェクトを検索する
function findProduct(id) {
  return getAllProductsUnique().find(p => p.id === id) || null;
}

/**
 * 商品のタブ所属データ（localStorageまたはFirebase）を適用する
 * data: { "productId": "タブ1,タブ2", ... }
 */
function applyProductTabsData(data) {
  // まず全商品の参照マップを作成（重複を避けるため直接参照）
  const allProdsFlat = new Map();
  Object.values(allProducts).flat().forEach(p => {
    if (!allProdsFlat.has(p.id)) allProdsFlat.set(p.id, p);
  });

  Object.keys(data).forEach(idStr => {
    const id = parseInt(idStr);
    const p = allProdsFlat.get(id);
    if (!p) return;

    const newTabs = data[idStr].split(',').filter(t => t);

    // 各タブのallProducts配列を調整する
    getTabs().forEach(tab => {
      const shouldBeIn = newTabs.includes(tab);
      const arr = allProducts[tab] || [];
      const isIn = arr.includes(p);

      if (shouldBeIn && !isIn && allProducts[tab]) {
        allProducts[tab].push(p);
      } else if (!shouldBeIn && isIn) {
        allProducts[tab].splice(arr.indexOf(p), 1);
      }
    });

    p.tabs = newTabs;
  });
}

// ========== スケジュールリセット（月・水・金 朝6時） ==========
const RESET_DAYS = [1, 3, 5]; // 月=1, 水=3, 金=5
const RESET_HOUR = 6;
const DAY_NAMES  = ['日', '月', '火', '水', '木', '金', '土'];

/** 次回のリセット予定時刻（Dateオブジェクト）を返す */
function getNextResetTime(from = new Date()) {
  for (let i = 1; i <= 7; i++) {
    const d = new Date(from);
    d.setDate(d.getDate() + i);
    d.setHours(RESET_HOUR, 0, 0, 0);
    if (RESET_DAYS.includes(d.getDay())) return d;
  }
}

/** 前回アクセス以降にリセット時刻を過ぎていたら自動でリセット */
function checkScheduledReset() {
  const lastReset = parseInt(localStorage.getItem('order-mgmt-last-reset') || '0');
  const now = Date.now();
  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    d.setHours(RESET_HOUR, 0, 0, 0);
    if (RESET_DAYS.includes(d.getDay()) && d.getTime() <= now && d.getTime() > lastReset) {
      doReset(false);
      localStorage.setItem('order-mgmt-last-reset', String(d.getTime()));
      break;
    }
  }
}

/** チェックをリセットして画面を更新する */
function doReset(showAlert = true) {
  // 重複なしで全商品をリセット
  getAllProductsUnique().forEach(p => { p.checked = false; });
  if (checksRef) checksRef.remove();
  renderList(); renderTabs();
  if (showAlert) alert('✅ 発注完了！');
}

/** ヘッダーに次回リセット時刻を表示する */
function updateResetTimer() {
  const timerEl = document.getElementById('reset-timer');
  const next = getNextResetTime();
  if (!next) { timerEl.style.display = 'none'; return; }
  timerEl.style.display = '';
  const remaining = next - Date.now();
  timerEl.textContent = `🔄 次回リセット: ${DAY_NAMES[next.getDay()]}曜 ${RESET_HOUR}:00`;
  timerEl.classList.toggle('soon', remaining < 3 * 3600000);
}

// 1分ごとにスケジュールリセットを確認
setInterval(() => { checkScheduledReset(); updateResetTimer(); }, 60000);

    const badge = count > 0
      ? `<span style="background:rgba(255,255,255,0.35);border-radius:10px;padding:0 6px;font-size:11px;">${count}</span>`
      : '';
    // data-tab属性でタブ名を安全に保持（日本語や特殊文字に対応）
    return `<button class="tab ${tab === currentTab ? 'active' : ''}" data-tab="${escapeAttr(tab)}" data-custom="${isCustom}">${escapeHtml(tab)}${badge}</button>`;
  }).join('');
  html += `<button class="tab-add-btn" id="tab-add-btn">＋</button>`;
  el.innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  dragSrcIndex = null;
  renderTabs();
  renderFilterBar();
  renderList();
}

// ========== タブのクリック・長押しイベント（イベント委譲） ==========
{
  const tabsEl = document.getElementById('tabs');
  let lpTimer = null;
  let lpDone  = false;

  // クリック：タブ切り替え or 追加ボタン
  tabsEl.addEventListener('click', (e) => {
    if (lpDone) { lpDone = false; return; } // 長押し後のクリックを無視
    if (e.target.closest('#tab-add-btn')) { openTabSheet('add'); return; }
    const btn = e.target.closest('.tab[data-tab]');

  });

    const btn = e.target.closest('.tab[data-tab]');
    if (!btn || btn.dataset.custom !== 'true') return;

    }, 500);
  }, { passive: true });

// ========== タブ管理 ==========
let tabCtxTargetTab   = null;  // コンテキストメニューの対象タブ名
let tabSheetMode      = 'add'; // 'add' | 'rename'
let tabSheetTargetTab = null;  // 名前変更対象のタブ名

/** カスタムタブのコンテキストメニューを表示する */
function openTabCtx(tabName, x, y) {
  tabCtxTargetTab = tabName;
  const overlay = document.getElementById('tab-ctx-overlay');
  const menu    = document.getElementById('tab-ctx-menu');
  overlay.classList.add('open');
  // メニューが画面外にはみ出さないよう位置を調整
  requestAnimationFrame(() => {
    const maxX = window.innerWidth  - menu.offsetWidth  - 8;
    const maxY = window.innerHeight - menu.offsetHeight - 8;
    menu.style.left = Math.min(x, maxX) + 'px';
    menu.style.top  = Math.min(y + 4, maxY) + 'px';
  });
}

function closeTabCtx() {
  document.getElementById('tab-ctx-overlay').classList.remove('open');
}

function openTabRename() {
  closeTabCtx();
  openTabSheet('rename', tabCtxTargetTab);
}

function confirmTabDelete() {
  closeTabCtx();
  const tab   = tabCtxTargetTab;
  const count = (allProducts[tab] || []).length;
  const msg   = count > 0
    ? `「${tab}」を削除しますか？\n（このタブに追加中の ${count} 件はこのタブから削除されます。元のタブには残ります。）`
    : `「${tab}」を削除しますか？`;
  if (confirm(msg)) deleteTab(tab);
}

/** タブ追加・名前変更のボトムシートを開く */
function openTabSheet(mode, tabName) {
  tabSheetMode      = mode;
  tabSheetTargetTab = tabName || null;
  document.getElementById('tab-sheet-title').textContent =
    mode === 'add' ? '新しい場所を追加' : '場所名を変更';
  document.getElementById('tab-sheet-input').value = mode === 'rename' ? tabName : '';
  document.getElementById('tab-sheet').classList.add('open');
  setTimeout(() => document.getElementById('tab-sheet-input').focus(), 300);
}

function closeTabSheet(e) {
  if (e.target === document.getElementById('tab-sheet')) closeTabSheetDirect();
}

function closeTabSheetDirect() {
  document.getElementById('tab-sheet').classList.remove('open');
}

function confirmTabSheet() {
  const name = document.getElementById('tab-sheet-input').value.trim();
  if (!name) return;
  if (tabSheetMode === 'add') addTab(name);
  else renameTab(tabSheetTargetTab, name);
  closeTabSheetDirect();
}

// Enterキーでも確定できるようにする
document.getElementById('tab-sheet-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmTabSheet();
});

/** 新しいカスタムタブを追加する */
function addTab(name) {
  if (getTabs().includes(name)) { alert(`「${name}」は既に存在します`); return; }
  customTabs.push(name);
  allProducts[name] = [];
  saveCustomTabs();
  currentTab = name;
  renderTabs();
  renderFilterBar();
  renderList();
}

/** カスタムタブの名前を変更する（商品のtabs配列も更新） */
function renameTab(oldName, newName) {
  if (getTabs().includes(newName)) { alert(`「${newName}」は既に存在します`); return; }
  const idx = customTabs.indexOf(oldName);
  if (idx !== -1) customTabs[idx] = newName;
  // allProductsのキーを新名前に移行
  allProducts[newName] = allProducts[oldName] || [];
  delete allProducts[oldName];
  // 全商品のtabs配列を更新
  getAllProductsUnique().forEach(p => {
    const ti = p.tabs.indexOf(oldName);
    if (ti !== -1) p.tabs[ti] = newName;
  });
  if (currentTab === oldName) currentTab = newName;
  saveCustomTabs();
  saveProductTabs();
  saveOrderToFirebase();
  renderTabs(); renderFilterBar(); renderList();
}

/** カスタムタブを削除する（商品は元のタブに残る） */
function deleteTab(name) {
  const idx = customTabs.indexOf(name);
  if (idx !== -1) customTabs.splice(idx, 1);
  if (allProducts[name]) {
    // 商品のtabs配列から削除したタブを除去する
    allProducts[name].forEach(p => {
      const ti = p.tabs.indexOf(name);
      if (ti !== -1) p.tabs.splice(ti, 1);
    });
    delete allProducts[name];
  }
  // FirebaseのOrderデータから削除
  if (orderRef) orderRef.child(encodeURIComponent(name)).remove();
  saveCustomTabs();
  saveProductTabs();
  if (currentTab === name) currentTab = getTabs()[0];
  renderTabs(); renderFilterBar(); renderList();
}

/** カスタムタブ一覧をlocalStorageとFirebaseに保存する */
function saveCustomTabs() {
  try { localStorage.setItem('order-mgmt-custom-tabs', JSON.stringify(customTabs)); } catch(e) {}
  if (customTabsRef) customTabsRef.set(customTabs.join(',') || null);
}

/** 商品のタブ所属をlocalStorageとFirebaseに保存する */
function saveProductTabs() {
  const data = {};
  getAllProductsUnique().forEach(p => {
    data[String(p.id)] = p.tabs.join(',');
  });
  try { localStorage.setItem('order-mgmt-product-tabs', JSON.stringify(data)); } catch(e) {}
  if (productTabsRef) productTabsRef.set(Object.keys(data).length > 0 ? data : null);
}

// ========== フィルターバー ==========

    all:    getProducts().length,
    blue:   visibles.filter(p => getHistoryClass(p.id) === 'hist-blue').length,
    yellow: visibles.filter(p => getHistoryClass(p.id) === 'hist-yellow').length,
    red:    visibles.filter(p => getHistoryClass(p.id) === 'hist-red').length,
    none:   visibles.filter(p => getHistoryClass(p.id) === '').length,

  const filters = [
    { id: 'all',    label: 'すべて',   cls: '' },
    { id: 'blue',   label: '🔵 今週',  cls: 'f-blue' },
    { id: 'yellow', label: '🟡 今月',  cls: 'f-yellow' },
    { id: 'red',    label: '🔴 古い',  cls: 'f-red' },
    { id: 'none',   label: '⚪ 未記録', cls: '' },

  document.getElementById('filter-bar').innerHTML = filters.map(f => `
    <button class="filter-btn ${f.cls} ${currentFilter === f.id ? 'active' : ''}"
            onclick="setFilter('${f.id}')">

    </button>

function setFilter(filter) {

  renderList();

// ========== リスト描画 ==========
function renderList() {
  const list = document.getElementById('list');
  const allProds = getProducts();
  const isFiltered = currentFilter !== 'all';

  // フィルター適用：絞り込み中は表示中かつ色が一致するものだけ表示
  const products = isFiltered
    ? allProds.filter(p => {
        if (!p.visible) return false;
        if (currentFilter === 'none') return getHistoryClass(p.id) === '';
        return getHistoryClass(p.id) === `hist-${currentFilter}`;
      })
    : allProds;

  if (products.length === 0) {
    list.innerHTML = '<div class="empty-state">該当する商品がありません</div>';
    updateBar(); return;
  }

  list.innerHTML = products.map(p => `
    <div class="item ${p.visible ? '' : 'hidden-item'} ${p.checked && p.visible ? 'checked' : ''} ${p.visible ? getHistoryClass(p.id) : ''}"
         id="item-${p.id}" ${isFiltered ? '' : 'draggable="true"'}
         oncontextmenu="return false"
         ${isFiltered ? '' : `ondragstart="dragStart(event, ${p.id})" ondragover="dragOver(event, ${p.id})" ondrop="drop(event, ${p.id})" ondragend="dragEnd(event)"`}>
      <div class="ops">
        ${isFiltered
          ? '<span class="handle" style="opacity:0.2;pointer-events:none">⠿</span>'
          : `<span class="handle" ontouchstart="touchDragStart(event, ${p.id})">⠿</span>`
        }
        <button class="toggle-vis ${p.visible ? 'vis-on' : ''}" onclick="toggleVisible(${p.id})">
          ${p.visible ? '👁' : '🙈'}
        </button>
      </div>
      <div class="item-name ${p.visible ? '' : 'hidden-text'}" onclick="openModal(${p.id})">
        <span class="short-name">${p.shortName}</span>
        <span class="hint">タップで詳細</span>
      </div>
      <div class="num-cell" ${p.visible ? `onclick="openNumPopup(${p.id}, 'min')"` : ''}>${p.minStock}</div>
      <div class="num-cell" ${p.visible ? `onclick="openNumPopup(${p.id}, 'order')"` : ''}>${p.orderQty}</div>
      <div class="check-cell">
        <div class="check-box ${p.checked && p.visible ? 'checked' : ''}" onclick="toggleCheck(${p.id})">
          ${p.checked && p.visible ? '✓' : ''}
        </div>
      </div>
    </div>
  `).join('');

  updateBar();
}

// ========== 操作 ==========
function toggleVisible(id) {
  const p = findProduct(id);
  if (!p) return;
  p.visible = !p.visible;
  if (!p.visible) p.checked = false;
  renderList(); renderTabs();
}

function toggleCheck(id) {
  const p = findProduct(id);
  if (!p || !p.visible) return;
  const newVal = !p.checked;
  if (checksRef) {
    // Firebase 経由で同期（全員の画面にリアルタイム反映）
    if (newVal) {
      checksRef.child(String(id)).set(true);
    } else {
      checksRef.child(String(id)).remove();
    }
    // UI 更新は Firebase リスナーが担うのでここでは行わない
  } else {
    p.checked = newVal;
    renderList(); renderTabs();
  }
}

// ========== 数値選択ポップアップ ==========
let numPopupTarget = null; // { id, field: 'min' | 'order' }

/**
 * 数値選択ポップアップを開く
 * 最低在庫: 0〜15, 発注数: 1〜15
 */
function openNumPopup(id, field) {
  const p = findProduct(id);
  if (!p) return;
  numPopupTarget = { id, field };

  const isMin   = field === 'min';
  const current = isMin ? p.minStock : p.orderQty;
  const min     = isMin ? 0 : 1;
  const max     = 15;

  document.getElementById('num-popup-title').textContent =
    isMin ? '最低在庫数を選択' : '発注数を選択';

  const grid = document.getElementById('num-popup-grid');
  grid.innerHTML = '';
  for (let i = min; i <= max; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-popup-btn' + (i === current ? ' selected' : '');
    btn.textContent = i;
    btn.onclick = () => selectNum(i);
    grid.appendChild(btn);
  }

  document.getElementById('num-popup-overlay').classList.add('open');
}

function closeNumPopup() {
  document.getElementById('num-popup-overlay').classList.remove('open');
  numPopupTarget = null;
}

function selectNum(val) {
  if (!numPopupTarget) return;
  const p = findProduct(numPopupTarget.id);
  if (!p) return;
  if (numPopupTarget.field === 'min') {
    p.minStock = val;
  } else {
    p.orderQty = val;
  }
  closeNumPopup();
  renderList();
}

function updateBar() {
  // 重複なしで全商品からチェック済みを集計する
  const checked = getAllProductsUnique().filter(p => p.checked && p.visible);
  const bar = document.getElementById('order-bar');
  document.getElementById('check-count').textContent = checked.length + '件';

// ========== ドラッグ ==========
function dragStart(e, id) {
  const products = getProducts();
  dragSrcIndex = products.findIndex(p => p.id === id);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e, id) {
  e.preventDefault();
  document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('drag-over');
}
function drop(e, id) {
  e.preventDefault();
  const products = getProducts();
  const targetIndex = products.findIndex(p => p.id === id);
  if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
  const moved = products.splice(dragSrcIndex, 1)[0];
  products.splice(targetIndex, 0, moved);
  saveOrderToFirebase();
  renderList();
}
function dragEnd(e) {
  document.querySelectorAll('.item').forEach(el => el.classList.remove('dragging', 'drag-over'));
  dragSrcIndex = null;
}

// ========== タッチドラッグ（iOS/Android対応） ==========
let touchDrag = { active: false, srcIndex: null, srcId: null };

/** ハンドルの touchstart：ドラッグ開始（長押しメニューを preventDefault で防止） */
function touchDragStart(e, id) {
  e.preventDefault();
  const products = getProducts();
  touchDrag = {
    active: true,
    srcIndex: products.findIndex(p => p.id === id),
    srcId: id
  };
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('dragging');
}

// document レベルの touchmove：スクロールを防ぎつつドラッグ先をハイライト
document.addEventListener('touchmove', function(e) {
  if (!touchDrag.active) return;
  e.preventDefault();
  const touch = e.touches[0];
  document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const item = target && target.closest('.item[id^="item-"]');
  if (item && item.id !== 'item-' + touchDrag.srcId) item.classList.add('drag-over');
}, { passive: false });

// document レベルの touchend：ドラッグ完了して並び替え実行
document.addEventListener('touchend', function(e) {
  if (!touchDrag.active) return;
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const item = target && target.closest('.item[id^="item-"]');

  if (item) {
    const targetId = parseInt(item.id.replace('item-', ''));
    const products = getProducts();
    const targetIndex = products.findIndex(p => p.id === targetId);
    if (touchDrag.srcIndex !== null && touchDrag.srcIndex !== targetIndex) {
      const moved = products.splice(touchDrag.srcIndex, 1)[0];
      products.splice(targetIndex, 0, moved);
      saveOrderToFirebase();
    }
  }

  document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over', 'dragging'));
  touchDrag = { active: false, srcIndex: null, srcId: null };
  renderList();
});

// ========== 商品詳細モーダル ==========
let modalTabSelection   = [];  // モーダルで選択中のタブ一覧
let modalColorSelection = null; // モーダルで選択中の色

function openModal(id) {
  modalTargetId = id;
  const p = findProduct(id);
  document.getElementById('modal-fullname').textContent = p.fullName;
  document.getElementById('modal-shortname').value = p.shortName;
  document.getElementById('modal-min').value = p.minStock;
  document.getElementById('modal-order').value = p.orderQty;
  // 現在の上書き色をセット（未設定なら null = 自動）
  modalColorSelection = colorOverride[id] !== undefined ? colorOverride[id] : null;
  renderModalColorSelector();
  renderModalTabs(p.tabs);
  document.getElementById('modal').classList.add('open');
}

/** 商品詳細モーダルのタブチェックボックスを描画する */
function renderModalTabs(currentTabs) {
  modalTabSelection = [...currentTabs];
  const field = document.getElementById('modal-tabs-field');
  const list  = document.getElementById('modal-tabs');

  // カスタムタブがない場合は表示しない
  if (customTabs.length === 0) { field.style.display = 'none'; return; }
  field.style.display = '';

  list.innerHTML = getTabs().map(tab => {
    const isActive = modalTabSelection.includes(tab);
    return `
      <div class="tab-check-item ${isActive ? 'active' : ''}" data-tab="${escapeAttr(tab)}" onclick="toggleModalTab(this.dataset.tab)">
        <div class="tab-check-item-icon">${isActive ? '✓' : ''}</div>
        <div class="tab-check-item-label">${escapeHtml(tab)}</div>
      </div>
    `;
  }).join('');
}

/** モーダル内でタブのチェック状態を切り替える（最低1つは必須） */
function toggleModalTab(tab) {
  const idx = modalTabSelection.indexOf(tab);
  if (idx !== -1) {
    if (modalTabSelection.length <= 1) return; // 最低1タブは必須
    modalTabSelection.splice(idx, 1);
  } else {
    modalTabSelection.push(tab);
  }
  renderModalTabs(modalTabSelection);
}

function renderModalColorSelector() {
  const opts = [
    { val: null,     label: '⚙ 自動', cls: 'c-auto' },
    { val: 'blue',   label: '● 青',   cls: 'c-blue' },
    { val: 'yellow', label: '● 黄',   cls: 'c-yellow' },
    { val: 'red',    label: '● 赤',   cls: 'c-red' },
    { val: 'none',   label: '○ なし', cls: 'c-none' },
  ];
  document.getElementById('modal-color').innerHTML = opts.map(o => `
    <button class="color-opt ${o.cls} ${modalColorSelection === o.val ? 'selected' : ''}"
            onclick="selectModalColor(${o.val === null ? 'null' : `'${o.val}'`})">
      ${o.label}
    </button>
  `).join('');
}

function selectModalColor(val) {
  modalColorSelection = val;
  renderModalColorSelector();
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); modalTargetId = null; }

function saveModal() {
  if (modalTargetId === null) return;
  const p = findProduct(modalTargetId);
  p.shortName = document.getElementById('modal-shortname').value || autoShorten(p.fullName);
  p.minStock  = parseInt(document.getElementById('modal-min').value)   || 0;
  p.orderQty  = parseInt(document.getElementById('modal-order').value) || 1;

  // 色の手動上書きを保存（null = 自動に戻す）
  if (modalColorSelection === null) {
    delete colorOverride[modalTargetId];
    if (colorOverrideRef) colorOverrideRef.child(String(modalTargetId)).remove();
  } else {
    colorOverride[modalTargetId] = modalColorSelection;
    if (colorOverrideRef) colorOverrideRef.child(String(modalTargetId)).set(modalColorSelection);
  }

  // タブ所属の変更を保存（カスタムタブが存在する場合のみ）
  if (customTabs.length > 0) {
    const oldTabs = [...p.tabs];
    const newTabs = [...modalTabSelection];

    // 削除されたタブからproductを除去
    oldTabs.forEach(tab => {
      if (!newTabs.includes(tab) && allProducts[tab]) {
        const idx = allProducts[tab].indexOf(p);
        if (idx !== -1) allProducts[tab].splice(idx, 1);
      }
    });

    // 追加されたタブにproductを追加（末尾に追加）
    newTabs.forEach(tab => {
      if (!oldTabs.includes(tab) && allProducts[tab] !== undefined) {
        if (!allProducts[tab].includes(p)) allProducts[tab].push(p);
      }
    });

    p.tabs = newTabs;
    saveProductTabs();
    saveOrderToFirebase();
  }

  closeModalDirect();
  renderFilterBar();
  renderList();
  renderTabs();
}

function completeOrder() {
  const now = Date.now();
  const historyUpdates = {};
  // 重複なしで全商品を処理する
  getAllProductsUnique().forEach(p => {
    if (p.checked && p.visible) {
      orderHistory[p.id] = now;
      historyUpdates[String(p.id)] = now;
    }
    p.checked = false;
  });
  // Firebase に履歴を書き込み・チェックをクリア
  if (historyRef && Object.keys(historyUpdates).length > 0) {
    historyRef.update(historyUpdates);
  }
  if (checksRef) checksRef.remove();
  localStorage.setItem('order-mgmt-last-reset', String(now));
  closeOrderModalDirect();
  renderList(); renderTabs();
  alert('✅ 発注完了！');
}

let colorOverrideRef = null; // 色の手動上書き
let customTabsRef    = null; // カスタムタブ一覧
let productTabsRef   = null; // 商品のタブ所属

let colorOverride = {};

// productTabsの最新データをキャッシュ（customTabs更新時に再適用するため）
let lastProductTabsData = {};

/** Firebase に並び順を保存する（全タブ対応、旧フォーマット互換キーも維持） */
function saveOrderToFirebase() {
  if (!orderRef) return;
  const data = {
    zakka:    allProducts["雑貨"].map(p => p.id).join(','),    // 旧フォーマット互換
    shomohin: allProducts["消耗品"].map(p => p.id).join(','),  // 旧フォーマット互換
  };
  // 新フォーマット：タブ名をキーとして保存
  getTabs().forEach(tab => {
    if (allProducts[tab]) data[tab] = allProducts[tab].map(p => p.id).join(',');
  });
  orderRef.set(data);
}

/** IDの文字列（カンマ区切り）を元に商品配列を並べ替える（部分的なマッチも許容） */
function applyOrderFromIdString(products, idStr) {
  try {
    const ids   = idStr.split(',').map(Number).filter(id => !isNaN(id));
    const idSet = new Set(ids);
    const map   = new Map(products.map(p => [p.id, p]));
    // 保存された順でマッチするものを先に並べ、残りを後ろに追加
    const ordered   = ids.filter(id => map.has(id)).map(id => map.get(id));
    const remaining = products.filter(p => !idSet.has(p.id));
    const sorted    = [...ordered, ...remaining];
    sorted.forEach((p, i) => { products[i] = p; });
    products.length = sorted.length;
  } catch (e) {}
}

(function initFirebase() {
  if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
    console.info('Firebase未設定のため同期は無効です。');
    return;
  }
  try {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    checksRef        = db.ref('checks');
    historyRef       = db.ref('orderHistory');
    orderRef         = db.ref('order');
    colorOverrideRef = db.ref('colorOverride');
    customTabsRef    = db.ref('customTabs');
    productTabsRef   = db.ref('productTabs');

    // ① チェック状態：全員にリアルタイム反映
    checksRef.on('value', (snapshot) => {
      const data = snapshot.val() || {};
      // 重複なしで全商品のチェックをリセットしてから再適用
      getAllProductsUnique().forEach(p => { p.checked = false; });
      Object.keys(data).forEach(id => {
        const p = findProduct(parseInt(id));
        if (p && p.visible) p.checked = true;
      });
      renderList(); renderTabs();
    });

    // ② 発注履歴：色分けをリアルタイム反映
    historyRef.on('value', (snapshot) => {
      const data = snapshot.val() || {};
      Object.keys(data).forEach(id => {
        orderHistory[parseInt(id)] = data[id];
      });
      renderFilterBar();
      renderList();
    });

    // ③ 色の手動上書き：全員にリアルタイム反映
    colorOverrideRef.on('value', (snapshot) => {
      colorOverride = snapshot.val() || {};
      renderFilterBar();
      renderList();
    });

    // ④ 並び順：全員の並びをリアルタイム反映（旧フォーマット互換）
    orderRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      // デフォルトタブ（旧フォーマットも考慮）
      const zakkaData    = data["雑貨"]   !== undefined ? data["雑貨"]   : data.zakka;
      const shomohinData = data["消耗品"] !== undefined ? data["消耗品"] : data.shomohin;
      if (zakkaData)    applyOrderFromIdString(allProducts["雑貨"],   zakkaData);
      if (shomohinData) applyOrderFromIdString(allProducts["消耗品"], shomohinData);
      // カスタムタブの並び順を適用
      customTabs.forEach(tab => {
        if (data[tab] && allProducts[tab]) applyOrderFromIdString(allProducts[tab], data[tab]);
      });
      renderList();
    });

    // ⑤ カスタムタブ：他のデバイスでの追加・削除・名前変更を反映
    customTabsRef.on('value', (snapshot) => {
      const val        = snapshot.val() || '';
      const serverTabs = val ? val.split(',').filter(t => t) : [];

      // 追加されたタブを反映
      serverTabs.forEach(tab => {
        if (!customTabs.includes(tab)) {
          customTabs.push(tab);
          if (!allProducts[tab]) allProducts[tab] = [];
        }
      });

      // 削除されたタブを除去（デフォルトタブは変更しない）
      [...customTabs].forEach(tab => {
        if (!serverTabs.includes(tab)) {
          if (allProducts[tab]) {
            allProducts[tab].forEach(p => {
              const ti = p.tabs.indexOf(tab);
              if (ti !== -1) p.tabs.splice(ti, 1);
            });
            delete allProducts[tab];
          }
          customTabs.splice(customTabs.indexOf(tab), 1);
        }
      });

      try { localStorage.setItem('order-mgmt-custom-tabs', JSON.stringify(customTabs)); } catch(e) {}

      // タブ構成変更後に商品のタブ所属を再適用する
      if (Object.keys(lastProductTabsData).length > 0) {
        applyProductTabsData(lastProductTabsData);
      }

      if (!getTabs().includes(currentTab)) currentTab = "雑貨";
      renderTabs(); renderFilterBar(); renderList();
    });

    // ⑥ 商品タブ所属：他のデバイスでの変更をリアルタイム反映
    productTabsRef.on('value', (snapshot) => {
      const data = snapshot.val() || {};
      lastProductTabsData = data;
      applyProductTabsData(data);
      try { localStorage.setItem('order-mgmt-product-tabs', JSON.stringify(data)); } catch(e) {}
      renderList(); renderTabs();
    });

  } catch (e) {
    console.warn('Firebase初期化失敗:', e);
  }
})();

// ========== 初期化 ==========

// 前回アクセス以降にリセット時刻を過ぎていたら自動リセット
checkScheduledReset();

// 次回リセット時刻をヘッダーに表示
updateResetTimer();

renderTabs();
renderFilterBar();
renderList();

// ========== Service Worker 登録（PWA対応） ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((registration) => {
        console.log('Service Worker 登録成功:', registration.scope);
      })
      .catch((error) => {
        console.log('Service Worker 登録失敗:', error);
      });
  });
}
</script>
</body>
